name: Deploy Theme to Hostinger

# FTP deploy does NOT work on Hostinger Managed WordPress — FTP is disconnected
# from the real file system. Deployment is done manually via hPanel Git integration.
#
# Deploy workflow:
#   1. git push (triggers this workflow — just validates the push)
#   2. hPanel → Git → click Deploy
#   3. WP Admin → LiteSpeed Cache → Purge All

on:
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Push received
        run: echo "Push to main received. Go to hPanel Git and click Deploy, then run LiteSpeed Cache Purge All in WP Admin."
