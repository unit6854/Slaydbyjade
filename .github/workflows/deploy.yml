name: Deploy Theme to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.REMOTE_PATH }}
          protocol: ftp
          port: 21
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**

      - name: Purge LiteSpeed Cache
        run: |
          WP_CRED="slaydjade:${{ secrets.WP_APP_PASSWORD }}"
          # Touch key pages so WordPress fires its cache-purge hooks
          for PAGE_ID in 5 9; do
            curl -s -o /dev/null -X POST \
              "https://slaydbyjade.com/wp-json/wp/v2/pages/$PAGE_ID" \
              -u "$WP_CRED" \
              -H "Content-Type: application/json" \
              -d "{\"date_modified\":\"$(date -u +%Y-%m-%dT%H:%M:%S)\"}"
          done
          # Also try the theme REST endpoint (works once OPcache validates)
          curl -s -o /dev/null -X POST \
            "https://slaydbyjade.com/wp-json/slaydbyjade/v1/purge?key=${{ secrets.PURGE_KEY }}" \
            -H "Content-Type: application/json"
